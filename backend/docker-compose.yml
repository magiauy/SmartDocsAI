services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      - DB_ENGINE=  # Use SQLite for Docker development
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - qdrant
      - neo4j
    


  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app worker -l info
    env_file:
      - .env
    environment:
      - DB_ENGINE=  # Use SQLite for Docker development
    volumes:
      - ./:/app
    depends_on:
      - redis
      - qdrant
      - neo4j

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4jpassword}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_AUTH#*/} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    volumes:
      - ollama_storage:/root/.ollama

  mysql:
    image: mysql:8.4
    profiles:
      - mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-smartdocsai}
      MYSQL_USER: ${DB_USER:-smartdocs}
      MYSQL_PASSWORD: ${DB_PASSWORD:-smartdocs}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  qdrant_storage:
  neo4j_data:
  neo4j_logs:
  ollama_storage:
  mysql_data:
